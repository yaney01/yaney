name: Patch YouTube source language detection

on:
  push:
    paths:
      - .github/workflows/patch-youtube-source-language.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch source-language detection
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("Scripts/youtube.response.js")
          content = path.read_text(encoding="utf-8")

          start_marker = 'let r={[e]:2},c=-1,o=0;'
          end_marker = 'for(let s=0;s<n.length;s++){'
          start = content.find(start_marker)
          if start < 0:
              raise SystemExit("Start marker not found")
          end = content.find(end_marker, start)
          if end < 0:
              raise SystemExit("End marker not found")

          replacement = '''let r={[e]:2},c=-1,o=0,f=a=>(a||"").toLowerCase().split(/[-_]/)[0],d=-1;let p=n.find(a=>(a.vssId||"").startsWith("a.")||a.kind==="asr");if(p){let a=f(p.languageCode),u=n.findIndex(s=>f(s.languageCode)===a&&!((s.vssId||"").startsWith("a.")||s.kind==="asr"));d=u>=0?u:n.indexOf(p)}if(d<0&&Array.isArray(i)){let a=Number.isInteger(t.defaultAudioTrackIndex)?i[t.defaultAudioTrackIndex]:i.find(s=>s.hasDefaultTrack)||i[0],u=f(a?.audioTrackId);if(u){let s=n.findIndex(a=>f(a.languageCode)===u&&!((a.vssId||"").startsWith("a.")||a.kind==="asr"));s<0&&(s=n.findIndex(a=>f(a.languageCode)===u)),s>=0&&(d=s)}}d<0&&Number.isInteger(t.defaultCaptionTrackIndex)&&t.defaultCaptionTrackIndex>=0&&t.defaultCaptionTrackIndex<n.length&&(d=t.defaultCaptionTrackIndex),d>=0&&(o=d);console.log(`[YT Caption] target=${e}; rendererDefault=${t.defaultCaptionTrackIndex}; defaultAudio=${t.defaultAudioTrackIndex}; sourceIndex=${o}; audio=${Array.isArray(i)?i.map((a,u)=>`${u}:${a.audioTrackId||""}:${a.defaultCaptionTrackIndex??""}:${a.hasDefaultTrack??""}`).join("|"):""}; tracks=${n.map((a,u)=>`${u}:${a.languageCode}:${a.vssId||""}:${a.kind||""}`).join("|")}`);'''

          updated = content[:start] + replacement + content[end:]
          path.write_text(updated, encoding="utf-8")
          PY

          node --check Scripts/youtube.response.js

      - name: Commit patched script
        shell: bash
        run: |
          if git diff --quiet -- Scripts/youtube.response.js; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Scripts/youtube.response.js
          git commit -m "fix: detect video source caption language"
          git push origin HEAD:main
