name: Patch YouTube caption source safely

on:
  push:
    paths:
      - .github/workflows/patch-youtube-caption-safe.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch caption source selection safely
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("Scripts/youtube.response.js")
          content = path.read_text(encoding="utf-8")

          start_marker = 'function Pi(l,e){'
          end_marker = 'function Br(l,e){'
          start = content.find(start_marker)
          if start < 0:
              raise SystemExit("Pi start marker not found")
          end = content.find(end_marker, start)
          if end < 0:
              raise SystemExit("Pi end marker not found")

          replacement = '''function Pi(l,e){e!=="off"&&ce(l,"captionTracks",t=>{let n=t.captionTracks,i=t.audioTracks;if(Array.isArray(n)&&n.length){let r={[e]:2},c=-1,o=0,d=n.findIndex(a=>a.kind==="asr"||(a.vssId||"").startsWith("a.")),p=d>=0?n[d].languageCode:"",m=d>=0?n.findIndex(a=>a.languageCode===p&&a.kind!=="asr"&&!(a.vssId||"").startsWith("a.")&&a.baseUrl):-1;o=m>=0?m:d>=0?d:0;for(let s=0;s<n.length;s++){let a=n[s],u=r[a.languageCode];u&&u>c&&(c=u,o=s),a.isTranslatable=!0}if(c!==2){let a=n[o],s;if((a.kind==="asr"||(a.vssId||"").startsWith("a."))&&a.baseUrl){s=Object.assign(Object.create(Object.getPrototypeOf(a)),a),s.baseUrl=a.baseUrl+`${a.baseUrl.includes("?")?"&":"?"}tlang=${encodeURIComponent(e)}`,s.name={runs:[{text:`@Enhance (${e})`}]},s.vssId=`a.${e}`,s.languageCode=e,s.isTranslatable=!1}else s=be.create({baseUrl:a.baseUrl+`&tlang=${e}`,name:{runs:[{text:`@Enhance (${e})`}]},vssId:`.${e}`,languageCode:e});n.push(s)}let f=c===2?o:n.length-1;console.log(`[YT Caption] target=${e}; sourceMode=${m>=0?"asr-language-manual-track":d>=0?"asr-track-clone":"fallback-first"}; asrIndex=${d}; sourceIndex=${o}; targetIndex=${f}; tracks=${n.map((a,u)=>`${u}:${a.languageCode}:${a.vssId||""}:${a.kind||""}:${a.baseUrl?"url":"no-url"}`).join("|")}`);if(Array.isArray(i))for(let a of i)Array.isArray(a.captionTrackIndices)||(a.captionTrackIndices=[]),a.captionTrackIndices.includes(f)||a.captionTrackIndices.push(f),a.defaultCaptionTrackIndex=f,a.captionsInitialState=3}return t.translationLanguages=Object.entries(Oi).map(([r,c])=>ke.create({languageCode:r,languageName:{runs:[{text:c}]}})),!0})}'''

          updated = content[:start] + replacement + content[end:]
          path.write_text(updated, encoding="utf-8")
          PY

          node --check Scripts/youtube.response.js

      - name: Commit patched script
        shell: bash
        run: |
          if git diff --quiet -- Scripts/youtube.response.js; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Scripts/youtube.response.js
          git commit -m "fix: safely use ASR language for caption source"
          git push origin HEAD:main
