name: Patch YouTube source caption selection

on:
  push:
    paths:
      - .github/workflows/patch-youtube-response.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch source-caption selection
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("Scripts/youtube.response.js")
          content = path.read_text(encoding="utf-8")

          old = 'let r={[e]:2,en:1},c=-1,o=0;'
          new = 'let r={[e]:2},c=-1,o=Number.isInteger(t.defaultCaptionTrackIndex)&&t.defaultCaptionTrackIndex>=0&&t.defaultCaptionTrackIndex<n.length?t.defaultCaptionTrackIndex:0;'

          count = content.count(old)
          if count != 1:
              raise SystemExit(f"Expected exactly one target fragment, found {count}")

          path.write_text(content.replace(old, new, 1), encoding="utf-8")
          PY

          node --check Scripts/youtube.response.js

      - name: Commit patched script
        shell: bash
        run: |
          if git diff --quiet -- Scripts/youtube.response.js; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Scripts/youtube.response.js
          git commit -m "fix: prefer video default caption source"
          git push origin HEAD:main
