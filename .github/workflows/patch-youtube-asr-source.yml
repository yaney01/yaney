name: Patch YouTube ASR source caption

on:
  push:
    paths:
      - .github/workflows/patch-youtube-asr-source.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Use auto-generated caption as source
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("Scripts/youtube.response.js")
          content = path.read_text(encoding="utf-8")

          start_marker = 'let r={[e]:2},c=-1,o=0,f=a=>'
          end_marker = 'for(let s=0;s<n.length;s++){' 
          start = content.find(start_marker)
          if start < 0:
              raise SystemExit("Start marker not found")
          end = content.find(end_marker, start)
          if end < 0:
              raise SystemExit("End marker not found")

          replacement = '''let r={[e]:2},c=-1,o=0,d=n.findIndex(a=>(a.vssId||"").startsWith("a.")||a.kind==="asr");d>=0&&(o=d);console.log(`[YT Caption] target=${e}; sourceMode=${d>=0?"asr":"fallback-first"}; sourceIndex=${o}; tracks=${n.map((a,u)=>`${u}:${a.languageCode}:${a.vssId||""}:${a.kind||""}`).join("|")}`);'''

          updated = content[:start] + replacement + content[end:]
          path.write_text(updated, encoding="utf-8")
          PY

          node --check Scripts/youtube.response.js

      - name: Commit patched script
        shell: bash
        run: |
          if git diff --quiet -- Scripts/youtube.response.js; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Scripts/youtube.response.js
          git commit -m "fix: use auto-generated caption as source"
          git push origin HEAD:main
