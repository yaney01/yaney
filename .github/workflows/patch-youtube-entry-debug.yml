name: Patch YouTube entry debug

on:
  push:
    paths:
      - .github/workflows/patch-youtube-entry-debug.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Add unconditional script marker
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("Scripts/youtube.response.js")
          content = path.read_text(encoding="utf-8")

          old = "// Build: 2026/7/19 16:16:39\n(()=>{"
          new = "// Build: 2026/7/19 16:16:39\nconsole.log(`[YT Custom v3] loaded url=${$request.url}`);\n(()=>{"

          count = content.count(old)
          if count != 1:
              raise SystemExit(f"Expected exactly one entry fragment, found {count}")

          path.write_text(content.replace(old, new, 1), encoding="utf-8")
          PY

          node --check Scripts/youtube.response.js

      - name: Commit patched script
        shell: bash
        run: |
          if git diff --quiet -- Scripts/youtube.response.js; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Scripts/youtube.response.js
          git commit -m "debug: add unconditional YouTube script marker"
          git push origin HEAD:main
